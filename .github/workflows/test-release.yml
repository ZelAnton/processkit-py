name: Test release (TestPyPI)

# Manual dry-run of the release packaging path: build the same cibuildwheel
# matrix + sdist as the real release, then publish to TestPyPI. Unlike
# release.yml it has NO side effects — no version bump, no commit/tag, no GitHub
# Release — so it is safe to run repeatedly to verify the build + upload path.
#
# Requires the TESTPYPI_API_TOKEN secret (a TestPyPI API token). Uploads the
# version currently in pyproject.toml with `--skip-existing`, so re-runs of the
# same version are no-ops.

on:
  workflow_dispatch:

concurrency:
  group: test-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Require the TestPyPI token
        env:
          TESTPYPI_API_TOKEN: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${TESTPYPI_API_TOKEN:-}" ]]; then
            echo "::error::TESTPYPI_API_TOKEN secret is not set. Add a TestPyPI API token under Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          echo "TestPyPI token present."

  # Build the same wheels matrix + sdist as the real release, via the shared
  # reusable workflow. No release-meta overlay: the dry-run packages the version
  # currently in pyproject.toml. Uploads `wheels-<os>` + `sdist` for publish.
  build_dists:
    needs: preflight
    uses: ./.github/workflows/_build-dists.yml
    with:
      overlay-release-meta: false

  publish_testpypi:
    needs: [build_dists]
    runs-on: ubuntu-latest
    steps:
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Collect built distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./dist
          pattern: "{wheels-*,sdist}"
          merge-multiple: true
      - name: Check metadata
        run: uvx twine check --strict ./dist/*
      - name: Upload to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TESTPYPI_API_TOKEN }}
          TWINE_REPOSITORY_URL: https://test.pypi.org/legacy/
        run: uvx twine upload --skip-existing ./dist/*.whl ./dist/*.tar.gz
