name: Docs

# Build the MkDocs Material site from docs/ as a strict link/anchor check and
# publish successful main-branch builds to GitHub Pages.

on:
  push:
    branches: [main]
    paths: ['docs/**', mkdocs.yml, .github/workflows/docs.yml]
  pull_request:
    branches: [main]
    paths: ['docs/**', mkdocs.yml, .github/workflows/docs.yml]
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    # Strict link/anchor gate only: runs on every PR, push, and manual dispatch.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      # `--strict` fails on a broken cross-page or in-page anchor link (see the
      # `validation:` block in mkdocs.yml), so a renamed heading can't ship a broken
      # guide. Renders markdown only — no Rust extension build needed, so sync only
      # the `docs` dependency-group (mkdocs-material, major-bound like the
      # cibuildwheel pin, and now locked in uv.lock instead of riding an unlocked
      # `uvx --with`) and skip installing the project itself.
      - run: uv sync --only-group docs --no-install-project
      - name: Build site (strict)
        run: uv run --no-sync mkdocs build --strict

  deploy:
    # PRs validate the site only; only a push to main may publish it.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --only-group docs --no-install-project
      - name: Build site for GitHub Pages
        run: uv run --no-sync mkdocs build --strict
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
