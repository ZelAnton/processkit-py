name: Release

# Manual, multi-platform release to PyPI. Shipped ENABLED but
# `workflow_dispatch`-only (no push/tag trigger), so it never runs on its own —
# click "Run workflow" and pick a bump. The version is never typed by hand: the
# latest `v*` tag drives the next number; the first release (no `v*` tag yet)
# seeds from the `version` in pyproject.toml.
#
# Pipeline:
#   prepare       — compute the version, fill/extract release notes, bump the
#                   manifests (uploaded as the `release-meta` artifact).
#   build_dists   — the shared reusable workflow (_build-dists.yml): the
#                   cibuildwheel matrix (abi3 GIL + free-threaded cp314t wheels)
#                   plus the sdist, built with the bumped manifests overlaid.
#   publish       — the single irreversible PyPI pivot, then push + GitHub Release.
#
# Actions are pinned to a full commit SHA (supply-chain hardening); the trailing
# comment records the human-readable version. Dependabot bumps the SHA + comment.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (ignored on the first release)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Compute the version and assemble the release metadata. No build, no remote
  # writes — everything here is reversible and re-runnable.
  # ---------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      current: ${{ steps.version.outputs.current }}
      first_release: ${{ steps.version.outputs.first_release }}
    steps:
      - name: Guard — release only from main
        run: |
          set -euo pipefail
          # Read the dispatch ref from $GITHUB_REF (not an interpolated expression) to
          # avoid script injection via a crafted branch name. Standard Actions guard.
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::Release must be dispatched from main (got: $GITHUB_REF). Re-run with 'Use workflow from: main'."
            exit 1
          fi
          echo "Dispatched from main."

      # No publish-credential preflight: with Trusted Publishing the credential is
      # minted per run (no PYPI_API_TOKEN to check), and a missing trusted publisher
      # can't be verified from here — it surfaces at the publish pivot with a clear
      # error + a setup link, before anything reaches the remote or the registry.

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0 # full history + tags, for version math and git-cliff
          persist-credentials: false

      - name: Determine next version
        id: version
        run: |
          set -euo pipefail
          # Newest version-sorted release tag. Use for-each-ref (--count=1) rather than
          # `git tag --list ... | head -n1`: head closes the pipe after one line, which
          # can SIGPIPE-abort `git tag` under `set -o pipefail` once the tag list exceeds
          # the pipe buffer (~thousands of tags).
          LATEST_TAG=$(git for-each-ref --count=1 --sort=-v:refname \
            --format='%(refname:short)' 'refs/tags/v[0-9]*.[0-9]*.[0-9]*')
          if [[ -n "$LATEST_TAG" ]]; then
            CURRENT="${LATEST_TAG#v}"
            if [[ ! "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Could not parse current version from tag (got: '$CURRENT')"
              exit 1
            fi
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "${{ inputs.bump }}" in
              major) NEW="$((MAJOR+1)).0.0" ;;
              minor) NEW="${MAJOR}.$((MINOR+1)).0" ;;
              patch) NEW="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
            esac
            echo "Latest release tag: $LATEST_TAG (current=$CURRENT); ${{ inputs.bump }} bump -> $NEW"
            echo "first_release=false" >> "$GITHUB_OUTPUT"
          else
            # First release: seed the version straight from pyproject.toml so the
            # published version matches what the repo declares. The bump input is ignored.
            CURRENT="0.0.0"
            NEW=$(grep -oP '(?<=^version = ")[^"]+' pyproject.toml | head -n1)
            echo "No release tags found; seeding first release from pyproject version=$NEW (bump input ignored)."
            echo "first_release=true" >> "$GITHUB_OUTPUT"
          fi
          if [[ ! "$NEW" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Computed version '$NEW' is not a valid MAJOR.MINOR.PATCH semver."
            exit 1
          fi
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"

      - name: Verify tag does not exist
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists"
            exit 1
          fi

      # git-cliff (next step) needs the previous tag locally to bound its commit range.
      # When it is missing (synthetic v0.0.0 of a first release) create it locally and
      # DO NOT push it — pushing would be a remote write before the pivot and would
      # break first-release re-run safety.
      - name: Ensure previous tag exists (local only)
        env:
          PREV_TAG: v${{ steps.version.outputs.current }}
        run: |
          set -euo pipefail
          if git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            echo "Previous tag $PREV_TAG already exists."
            exit 0
          fi
          ROOT=$(git rev-list --max-parents=0 HEAD | tail -n1)
          echo "Previous tag $PREV_TAG does not exist; creating it locally at root commit $ROOT (not pushed)."
          git tag "$PREV_TAG" "$ROOT"

      - name: Install git-cliff
        uses: taiki-e/install-action@50414676f9f5d50a65992c6dd2ed02641263226c # v2
        with:
          tool: git-cliff@2

      - name: Auto-fill [Unreleased] from git log if empty
        run: |
          set -euo pipefail
          python3 scripts/release/changelog.py autofill --prev-tag "v${{ steps.version.outputs.current }}"

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          python3 scripts/release/changelog.py extract-notes --out release-notes.md

      # Persist the computed version into pyproject.toml AND Cargo.toml so the wheels
      # built downstream carry the released version. maturin reads the version from
      # pyproject.toml; Cargo.toml is bumped in parallel to keep both in sync. These
      # reversible edits travel to the build/publish jobs as the `release-meta`
      # artifact and reach the remote only after the pivot.
      - name: Bump version in pyproject.toml and Cargo.toml
        run: |
          set -euo pipefail
          NEW="${{ steps.version.outputs.version }}"
          sed -i -E "s|^version = \"[^\"]+\"|version = \"$NEW\"|" pyproject.toml
          sed -i -E "s|^version = \"[^\"]+\"|version = \"$NEW\"|" Cargo.toml
          # Keep Cargo.lock's entry for the local (path) binding crate in sync.
          # No cargo needed in `prepare`. No source-only-line ambiguity to
          # disambiguate: the binding crate is named `processkit-py`, distinct
          # from the `processkit` registry dependency it wraps.
          python3 scripts/release/cargo_lock.py --new-version "$NEW"

      # uv.lock records its own `version` for this editable package (`source =
      # { editable = "." }`), independent of every other pinned dependency. The
      # version bump above leaves that entry stale, and CI's `uv export --locked`
      # (the pip-audit job) then refuses to run against a lockfile that disagrees
      # with pyproject.toml. Re-lock now so the release commit carries a lockfile
      # consistent with the version it just bumped; no dependency changed, so this
      # only touches that one self-referential field.
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: true
      - name: Re-lock uv.lock against the bumped version
        run: uv lock

      # The version-bumped manifests + the promoted changelog + the extracted notes,
      # carried to every downstream job as the single source of truth.
      - name: Promote Unreleased section in CHANGELOG.md
        run: |
          set -euo pipefail
          python3 scripts/release/changelog.py promote \
            --version "${{ steps.version.outputs.version }}" \
            --tag "${{ steps.version.outputs.tag }}" \
            --prev-tag "v${{ steps.version.outputs.current }}" \
            --first-release "${{ steps.version.outputs.first_release }}" \
            --repo "${{ github.server_url }}/${{ github.repository }}"

      - name: Upload release metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-meta
          path: |
            pyproject.toml
            Cargo.toml
            Cargo.lock
            uv.lock
            CHANGELOG.md
            release-notes.md
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Build the release artifacts (wheels matrix + sdist) via the shared reusable
  # workflow. `overlay-release-meta` overlays the version-bumped manifests from
  # `prepare` so the artifacts carry the release version; `ref: main` matches the
  # branch `prepare` bumped. Uploads `wheels-<os>` + `sdist`, consumed by publish.
  # ---------------------------------------------------------------------------
  build_dists:
    needs: prepare
    uses: ./.github/workflows/_build-dists.yml
    with:
      ref: main
      overlay-release-meta: true

  # ---------------------------------------------------------------------------
  # The single irreversible step (PyPI publish) and the reversible writes around
  # it. RELEASE ORDERING INVARIANT: publishing to PyPI cannot be undone (a
  # version can be yanked but never re-uploaded), so it is the pivot. Everything
  # before it is cheap and reversible (the wheels/sdist already built above, plus
  # a LOCAL commit+tag not yet pushed); everything after it (push the commit+tag
  # to main, create the Release) is reversible/recreatable and made idempotent +
  # retried. A failure before the pivot leaves no trace on the remote or
  # registry — just re-run. Never move the publish after the tag push, and keep
  # the post-pivot steps idempotent.
  # ---------------------------------------------------------------------------
  publish:
    needs: [prepare, build_dists]
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the release commit + tag, create the Release, and deploy versioned docs
      id-token: write # PyPI Trusted Publishing (OIDC); also enables the token fallback path
    # (Trusted-publishing best practice is a dedicated, minimal `id-token: write`
    # job. It is kept inline here because the pivot ordering — publish, THEN push the
    # tag, THEN create the Release — is the load-bearing invariant; splitting it
    # across jobs to isolate the token scope would risk that ordering for a marginal
    # gain, since the OIDC credential is only usable against this repo's PyPI
    # trusted publisher.)
    steps:
      # No secret preflight: with Trusted Publishing the credential is minted per
      # run (no PYPI_API_TOKEN needed), and the OIDC config can't be checked from
      # here — a missing publisher surfaces at the pivot with a clear error + a
      # setup link, before anything is pushed to the remote.

      # Mint a short-lived GitHub App installation token (the `ZelAnton-release-bot`
      # App, id in `RELEASE_APP_ID`). Pushing the release commit + tag to `main` with it
      # makes the **App** the actor, and the App sits in the branch-protection ruleset's
      # bypass list, so the push is allowed. The default `github-actions[bot]` CANNOT be
      # granted a ruleset bypass (it's a system actor, not an App), and a PAT would
      # expire — an App token is short-lived and auto-revoked. Needs repo variable
      # `RELEASE_APP_ID` + secret `RELEASE_APP_PRIVATE_KEY`; until both are set this step
      # is skipped and the push falls back to `GITHUB_TOKEN` (fine only while `main` is
      # unprotected). See release-token-bypass.md.
      - name: Mint GitHub App token
        id: app-token
        if: ${{ vars.RELEASE_APP_ID != '' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      # Overlay the version-bumped manifests + promoted changelog + release notes
      # (the same files the wheels were built from) onto the checkout, so the
      # release commit records exactly what was published.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-meta
          path: .

      - name: Collect built distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./artifacts
          pattern: "{wheels-*,sdist}"
          merge-multiple: true

      # Write SHA256SUMS to the workspace root, NOT into ./artifacts: the publish
      # action below uploads every file in its packages-dir, and a non-distribution
      # file there would make twine reject the batch. It is a GitHub Release asset
      # only, never a PyPI upload.
      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd ./artifacts
          files=(*.whl *.tar.gz)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No package files to hash in ./artifacts. Did the build jobs run?"
            exit 1
          fi
          sha256sum "${files[@]}" > ../SHA256SUMS
          cat ../SHA256SUMS

      # Create the release commit and tag LOCALLY, but do NOT push yet: the push is a
      # VCS write and must happen AFTER the irreversible PyPI publish (the pivot below).
      - name: Commit and tag the release (local only)
        run: |
          set -euo pipefail
          git config user.name "Anton Zhelezniakou"
          git config user.email "github@zelanton.net"
          git add pyproject.toml CHANGELOG.md Cargo.toml
          # uv.lock and Cargo.lock record resolved deps; re-stage only if already tracked.
          if git ls-files --error-unmatch uv.lock >/dev/null 2>&1; then git add uv.lock; fi
          if git ls-files --error-unmatch Cargo.lock >/dev/null 2>&1; then git add Cargo.lock; fi
          git commit -m "Release ${{ needs.prepare.outputs.tag }}"
          git tag "${{ needs.prepare.outputs.tag }}"

      # uv is not preinstalled on the GitHub runner image; install it so the
      # `uvx twine check` below resolves. (The publish action does its own
      # metadata check, but this strict pre-pivot gate catches a render/metadata
      # break BEFORE the irreversible step — free here, un-yankable once on PyPI.)
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: true
      - name: Check distribution metadata
        run: uvx 'twine>=6,<7' check --strict ./artifacts/*.whl ./artifacts/*.tar.gz

      # === PIVOT: the single irreversible step ===
      # PyPI Trusted Publishing (OIDC) by default: with NO PYPI_API_TOKEN secret set,
      # the action mints a short-lived credential per run (needs the `id-token: write`
      # permission above + a trusted publisher configured on pypi.org for this
      # repo + this workflow filename — https://docs.pypi.org/trusted-publishers/).
      # If PYPI_API_TOKEN *is* set, the action uses that token instead (a clean
      # fallback for a first release before the publisher is configured). `skip-existing`
      # makes a re-run idempotent — an already-published file counts as success — so
      # after a transient upload failure it is safe to re-run the whole workflow:
      # nothing has been pushed to the remote yet. The action verifies metadata and,
      # under OIDC, attaches PEP 740 attestations automatically. (No auto-retry on a
      # transient network error; re-run the workflow — `skip-existing` covers it.)
      - name: Publish to PyPI (irreversible pivot)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: artifacts
          skip-existing: true
          password: ${{ secrets.PYPI_API_TOKEN }}

      # Reversible VCS write, AFTER the pivot. --atomic guarantees the branch and tag
      # move together (or neither does), so we never advance main while losing the tag.
      - name: Push the release commit + tag (atomic)
        run: git push --atomic origin HEAD:refs/heads/main "${{ needs.prepare.outputs.tag }}"

      # Final, recreatable step, made idempotent (edit the Release if it already
      # exists, else create it) and retried. By now the package is on PyPI AND the tag
      # is on main, so a blind re-run of the WHOLE workflow would compute the NEXT
      # version and orphan this release — hence the failure message tells the operator
      # to finish by hand rather than re-running.
      - name: Create or update the GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(./artifacts/*.whl ./artifacts/*.tar.gz SHA256SUMS)
          for attempt in 1 2 3; do
            if gh release view "$TAG" >/dev/null 2>&1; then
              if gh release edit "$TAG" --title "$TAG" --notes-file release-notes.md \
                 && gh release upload "$TAG" "${assets[@]}" --clobber; then
                echo "Updated existing Release $TAG (attempt $attempt)."
                exit 0
              fi
            else
              if gh release create "$TAG" --title "$TAG" --notes-file release-notes.md "${assets[@]}"; then
                echo "Created Release $TAG (attempt $attempt)."
                exit 0
              fi
            fi
            echo "::warning::GitHub Release step attempt $attempt failed; retrying after backoff..."
            sleep $((attempt * 10))
          done
          echo "::error::Failed to create/update the GitHub Release after 3 attempts. The package is ALREADY on PyPI and the tag is ALREADY on main. Do NOT re-run this workflow (a re-run computes the NEXT version and orphans this release). Finish by hand: if the Release does not exist yet, 'gh release create $TAG --title $TAG --notes-file release-notes.md ./artifacts/*.whl ./artifacts/*.tar.gz SHA256SUMS'; if it already exists, 'gh release edit $TAG --notes-file release-notes.md && gh release upload $TAG ./artifacts/*.whl ./artifacts/*.tar.gz SHA256SUMS --clobber'."
          exit 1

      # Publish this release's versioned docs (mike, see mkdocs.yml's `extra.
      # version.provider: mike` and RELEASING.md) and advance the `latest`
      # alias to it. Deliberately last, and best-effort (does not fail the
      # job): by this point PyPI + the tag + the GitHub Release are already
      # done, so a docs-only hiccup must never look like a failed release (and
      # must never tempt a re-run of the whole workflow, which would compute
      # the NEXT version). Deployed under MAJOR.MINOR — mike's own recommended
      # scheme, excluding the patch number — so a patch release re-deploys
      # into the SAME slot (mike overwrites that version's content and bumps
      # its displayed title to the full patch version) while a minor/major
      # release creates a new slot; `--update-aliases` moves `latest` here even
      # if it previously pointed elsewhere. `--alias-type redirect`: docs.yml's
      # `publish-pages` job republishes the `gh-pages` tree as a Pages
      # *artifact* (actions/upload-pages-artifact), where mike's default
      # symlink aliases are not guaranteed to survive.
      - name: Deploy versioned docs (mike)
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          uv sync --only-group docs --no-install-project
          git fetch origin gh-pages --depth=1 || true
          IFS='.' read -r MAJOR MINOR _ <<< "$VERSION"
          SLOT="$MAJOR.$MINOR"
          ok=false
          for attempt in 1 2 3; do
            if uv run --no-sync mike deploy --push --update-aliases --alias-type redirect \
                --title "$VERSION" "$SLOT" latest \
              && uv run --no-sync mike set-default --push --allow-undefined latest; then
              echo "Deployed docs for $VERSION to gh-pages slot $SLOT (attempt $attempt)."
              ok=true
              break
            fi
            echo "::warning::mike deploy attempt $attempt failed; retrying after backoff..."
            sleep $((attempt * 10))
          done
          if [[ "$ok" != true ]]; then
            echo "::warning::Failed to deploy versioned docs via mike after 3 attempts. The package is ALREADY on PyPI, the tag is ALREADY on main, and the GitHub Release is ALREADY created — this does NOT need a re-run. Finish by hand: 'mike deploy --push --update-aliases --alias-type redirect --title \"$VERSION\" \"$SLOT\" latest && mike set-default --push --allow-undefined latest'."
          fi

  # ---------------------------------------------------------------------------
  # Republish the gh-pages tree (now including this release's version and the
  # moved `latest` alias, from the mike deploy above) as a GitHub Pages
  # artifact. Pages is on "Source: GitHub Actions" (see docs.yml): the live
  # site at https://zelanton.github.io/processkit-py/ serves whatever artifact
  # `deploy-pages` last uploaded, NOT the `gh-pages` branch content directly —
  # `mike deploy --push` above only updates the `gh-pages` branch, it does not
  # by itself change what the live site shows. Without this job, a release
  # would sit in `gh-pages` invisibly until an unrelated docs-affecting push to
  # `main` happened to run docs.yml's own `publish-pages` job. Mirrors that job
  # exactly (same checkout/upload/deploy steps) and shares its `pages`
  # concurrency group so the two never race uploading/deploying the Pages
  # artifact; scoped to this job only (not the whole workflow) so it doesn't
  # also serialize the PyPI pivot above behind a running docs.yml deploy.
  # Depends on `publish` succeeding (a failed release must not touch Pages);
  # best-effort within that: if the mike deploy step above could not push the
  # new version (see its own warning), this job simply republishes whatever
  # is already on `gh-pages` — a harmless no-op re-deploy, not a failure.
  # ---------------------------------------------------------------------------
  publish-pages:
    needs: publish
    concurrency:
      group: pages
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      pages: write # deploy to GitHub Pages
      id-token: write # OIDC for the Pages deployment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: gh-pages
          persist-credentials: false
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
