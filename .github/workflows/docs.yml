name: Docs

# Build the mkdocs-material site from docs/ as a strict link/anchor check.
# This repo does NOT publish to GitHub Pages (or anywhere else) — a separate
# project owns docs publishing. Do not re-add a gh-pages/mike/Pages deploy job
# here; see RELEASING.md's "Docs site" note.

on:
  push:
    branches: [main]
    paths: ['docs/**', mkdocs.yml, .github/workflows/docs.yml]
  pull_request:
    branches: [main]
    paths: ['docs/**', mkdocs.yml, .github/workflows/docs.yml]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    # Strict link/anchor gate only: runs on every PR, push, and manual dispatch.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: true
      # `--strict` fails on a broken cross-page or in-page anchor link (see the
      # `validation:` block in mkdocs.yml), so a renamed heading can't ship a broken
      # guide. Renders markdown only — no Rust extension build needed, so sync only
      # the `docs` dependency-group (mkdocs-material, major-bound like the
      # cibuildwheel pin, and now locked in uv.lock instead of riding an unlocked
      # `uvx --with`) and skip installing the project itself.
      - run: uv sync --only-group docs --no-install-project
      - name: Build site (strict)
        run: uv run --no-sync mkdocs build --strict
