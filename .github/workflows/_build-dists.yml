name: Build distributions (reusable)

# Reusable (`workflow_call`) build of the release artifacts: the cibuildwheel
# matrix (one abi3 GIL wheel + a free-threaded cp314t wheel per OS/arch) plus the
# platform-independent sdist. Both release.yml and test-release.yml call this so
# the 5-OS matrix lives in one place.
#
# It only BUILDS and uploads artifacts (`wheels-<os>` and `sdist`); it never
# publishes, so it has no side effects and needs no secrets. The two callers
# differ only in the inputs below.

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to check out. Empty = the ref that triggered the caller."
        type: string
        default: ""
      overlay-release-meta:
        description: >-
          Download the `release-meta` artifact (uploaded by the caller's prepare
          job) and overlay it onto the checkout, so the built artifacts carry the
          bumped release version. The release path sets this; the TestPyPI dry-run
          builds the version already in pyproject.toml.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # The abi3 wheel (cp310, runs on every GIL CPython 3.10+) plus a free-threaded
  # cp314t wheel per OS/arch. Each runner builds its own native arch: Linux
  # x86_64 (manylinux), Linux aarch64 (native ARM runner), Windows x64, and
  # Windows arm64 (the `windows-11-arm` native ARM runner — free for public
  # repos; cibuildwheel ships both an ARM64 CPython 3.10 for the abi3 wheel and
  # an ARM64 cp314t for the free-threaded one, so both families build natively,
  # no cross-compile). The macOS runner (macos-14, Apple Silicon) is the one
  # exception — it CROSS-compiles both arm64 (native) and x86_64 (Intel), since
  # GitHub retired the free `macos-13` Intel runner but Rust cross-compiles
  # darwin-x86_64 from an arm64 host trivially (rustup target + cibuildwheel's
  # `CIBW_ARCHS_MACOS`).
  #
  # (cp310-win_arm64 note: python.org's own installer page only lists Windows/ARM64
  # downloads from 3.11 on, which looks alarming next to `build = "cp310-*
  # cp314t-*"` — but cibuildwheel doesn't use that installer on Windows at all; it
  # installs interpreters from the `python`/`pythonarm64` NuGet packages, and
  # `pythonarm64` has shipped 3.10 (down to 3.10.11) since 2023. Verified directly:
  # `CIBW_ARCHS_WINDOWS=ARM64 cibuildwheel --platform windows
  # --print-build-identifiers` on the pinned `cibuildwheel>=4,<5` resolves
  # `cp310-win_arm64`, and PyPI already carries a published
  # `processkit_py-*-cp310-abi3-win_arm64.whl` for this project's current release —
  # this build has never actually been silently skipped. The step below still
  # guards against it regressing, since `if-no-files-found: error` further down only
  # checks the wheelhouse isn't empty, not that this specific tag is in it.)
  # ---------------------------------------------------------------------------
  build_wheels:
    name: wheels (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, windows-11-arm, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      # Host toolchain for the Windows/macOS builds; the Linux manylinux container
      # installs its own Rust via the cibuildwheel `before-all` hook (pyproject.toml).
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
      # Add the Intel macOS cross-compile target — only meaningful on the
      # macos-14 (arm64) runner; a no-op elsewhere (`rustup target add` on a
      # target already implied by the host triple is harmless, but skip it
      # outright to keep the step's purpose obvious in the log).
      - if: matrix.os == 'macos-14'
        run: rustup target add x86_64-apple-darwin
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: true
      # Overlay the version-bumped manifests so the wheel carries the release version.
      - if: ${{ inputs.overlay-release-meta }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-meta
          path: .
      - name: Build wheels
        run: uvx 'cibuildwheel>=4,<5' --output-dir wheelhouse
      # `if-no-files-found: error` below only fails when wheelhouse/ is entirely
      # empty; it happily passes if the arm64 job produced only the cp314t wheel
      # and cibuildwheel silently dropped cp310-win_arm64 (or vice versa), which
      # is exactly the failure mode that motivated the comment above this job.
      # Assert the two win_arm64 tags explicitly, so a future regression here
      # fails loudly instead of shipping an incomplete release.
      - if: matrix.os == 'windows-11-arm'
        name: Verify win_arm64 wheel tags were built
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          abi3=(wheelhouse/*-cp310-abi3-win_arm64.whl)
          freethreaded=(wheelhouse/*-cp314-cp314t-win_arm64.whl)
          if [ "${#abi3[@]}" -eq 0 ]; then
            echo "::error::No cp310-abi3-win_arm64 wheel in wheelhouse" \
              "— cibuildwheel silently dropped the abi3 GIL build for Windows/ARM64." >&2
            exit 1
          fi
          if [ "${#freethreaded[@]}" -eq 0 ]; then
            echo "::error::No cp314-cp314t-win_arm64 wheel in wheelhouse" \
              "— cibuildwheel silently dropped the free-threaded build for Windows/ARM64." >&2
            exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # The platform-independent source distribution, built once.
  # ---------------------------------------------------------------------------
  build_sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: true
      - if: ${{ inputs.overlay-release-meta }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-meta
          path: .
      # `maturin sdist` packages source only (no compile), so no Rust toolchain here
      # (hence a standalone `uvx`, not `uv run`, which would try to build the project).
      # Floor matches the authoritative `[build-system]`/dev-group maturin pin
      # (`>=1.14.1,<2.0`) so the shipped sdist isn't built by an older or a 2.x maturin.
      - name: Build sdist
        run: uvx 'maturin>=1.14.1,<2.0' sdist --out dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
