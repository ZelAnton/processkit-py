site_name: processkit
site_description: >-
  Asyncio-native, kernel-backed, no-orphan child-process toolkit for Python — a
  thin binding to the processkit Rust crate.
site_url: https://zelanton.github.io/processkit-py/
repo_url: https://github.com/ZelAnton/processkit-py
repo_name: ZelAnton/processkit-py
# The guides live in docs/; this site renders them as-is (docs/README.md is the home).
docs_dir: docs

# Make `mkdocs build --strict` (the CI gate) catch broken cross-page AND in-page
# anchor links, so a renamed heading can't silently break a guide's table of contents.
validation:
  links:
    anchors: warn
    unrecognized_links: warn

theme:
  name: material
  features:
    - navigation.top
    - navigation.sections
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# Versioned docs (published via `mike deploy`, see RELEASING.md): this is the
# only piece mkdocs-material needs to render the version selector in the site
# header. `mike` itself is not listed under `plugins:` here — it injects its
# own mkdocs plugin only for the duration of `mike deploy`/`mike serve`, so an
# ordinary `mkdocs build`/`mkdocs serve` (no `gh-pages` branch, no `versions.json`)
# stays unaffected: the selector's `versions.json` fetch just 404s locally and
# mkdocs-material hides the selector, so `mkdocs build --strict` (the CI gate)
# never depends on a `gh-pages` branch existing. To see the real selector
# locally, deploy at least one version to a local `gh-pages` branch (e.g. `uv
# run --group docs mike deploy --update-aliases 0.0 dev`) and run `uv run
# --group docs mike serve`.
extra:
  version:
    provider: mike

nav:
  - Home: README.md
  - Cookbook: cookbook.md
  - Coming from subprocess: migrating.md
  - Running commands: commands.md
  - Process groups: process-groups.md
  - Sandboxing untrusted tools: sandboxing.md
  - Streaming & interactive I/O: streaming.md
  - Pipelines: pipelines.md
  - Timeouts & cancellation: timeouts-and-cancellation.md
  - Supervision: supervision.md
  - Testing your code: testing.md
  - Command-line usage: cli.md
  - Async runtimes & event loops: event-loops.md
  - Platform support: platforms.md
  - API reference: api-reference.md
  - Architecture: internals.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details

plugins:
  - search
  # The API reference (docs/api-reference.md) is a list of `::: processkit.<name>`
  # autodoc directives; mkdocstrings renders each from the type stub + docstrings.
  # `allow_inspection: false` forces griffe's *static* (AST) analysis: the Docs CI
  # job builds with `uv sync --only-group docs --no-install-project`, so the
  # compiled `_processkit` extension is never importable — griffe reads
  # `src/processkit/_processkit.pyi` (and the pure-Python shim modules) instead,
  # keeping the strict build extension-free. `docs/api-reference.md` is generated
  # by `scripts/gen_api_reference.py` (with a `--check` drift guard); do not edit
  # it by hand.
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            allow_inspection: false
            docstring_style: null
            heading_level: 3
            inherited_members: true
            members_order: source
            separate_signature: true
            show_bases: false
            show_if_no_docstring: true
            show_root_full_path: false
            show_root_heading: true
            show_signature_annotations: true
            show_source: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            signature_crossrefs: false
