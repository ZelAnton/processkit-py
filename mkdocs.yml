site_name: processkit
site_description: >-
  Asyncio-native, kernel-backed, no-orphan child-process toolkit for Python — a
  thin binding to the processkit Rust crate.
site_url: https://zelanton.github.io/processkit-py/
repo_url: https://github.com/ZelAnton/processkit-py
repo_name: ZelAnton/processkit-py
# The guides live in docs/; this site renders them as-is (docs/README.md is the home).
docs_dir: docs

# Make `mkdocs build --strict` (the CI gate) catch broken cross-page AND in-page
# anchor links, so a renamed heading can't silently break a guide's table of contents.
validation:
  links:
    anchors: warn
    unrecognized_links: warn

theme:
  name: material
  features:
    - navigation.top
    - navigation.sections
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: README.md
  - Cookbook: cookbook.md
  - Coming from subprocess: migrating.md
  - Running commands: commands.md
  - Process groups: process-groups.md
  - Streaming & interactive I/O: streaming.md
  - Pipelines: pipelines.md
  - Timeouts & cancellation: timeouts-and-cancellation.md
  - Supervision: supervision.md
  - Testing your code: testing.md
  - Platform support: platforms.md
  - Architecture: internals.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details

plugins:
  - search
