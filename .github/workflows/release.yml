name: Release

# Manual release workflow for a Python package published to PyPI.
#
# Shipped ENABLED but `workflow_dispatch`-only (no push/tag trigger), so it never
# runs on its own — click "Run workflow" and pick a bump. The version is never
# typed by hand: the latest `v*` tag drives the next number; the first release
# (no `v*` tag yet) seeds from the `version` in pyproject.toml.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (ignored on the first release)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the release commit + tag, and create the Release
    steps:
      # RELEASE ORDERING INVARIANT (rationale repeated at each relevant step):
      # publishing to PyPI is the single IRREVERSIBLE step, so it is the pivot.
      # Everything before it is cheap and reversible (build/test/package, plus a
      # LOCAL commit+tag that is not yet pushed); everything after it (push the
      # commit+tag to main, create the GitHub Release) is reversible/recreatable
      # and is made idempotent + retried. A failure before the pivot leaves no
      # trace on the remote or registry — just re-run. A failure after the pivot
      # is recoverable by re-run, EXCEPT once the tag is on main (see the Release
      # step's note).
      #
      # The "Push the release commit + tag" step pushes straight to main. If you
      # protect main with a rule that requires pull requests or status checks, that
      # push is rejected unless the pusher can bypass it. This workflow mints a
      # short-lived GitHub App token (repo variable RELEASE_APP_ID + secret
      # RELEASE_APP_PRIVATE_KEY) and checks out with it, so the push runs as the App
      # — add that App to the ruleset's bypass list. Until it is configured the
      # checkout falls back to GITHUB_TOKEN (fine while main is unprotected). Recipe:
      # release-token-bypass.md.
      # Actions are pinned to a full commit SHA (supply-chain hardening); the
      # trailing comment records the human-readable version. Dependabot bumps the
      # SHA and updates the comment on its weekly run.

      - name: Guard — release only from main
        run: |
          set -euo pipefail
          # Read the dispatch ref from $GITHUB_REF (not an interpolated expression) to
          # avoid script injection via a crafted branch name. Standard Actions guard.
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::Release must be dispatched from main (got: $GITHUB_REF). Re-run with 'Use workflow from: main'."
            exit 1
          fi
          echo "Dispatched from main."

      - name: Preflight — required secrets present before any external action
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          # Fail fast, before any irreversible publish or VCS push, if the publish
          # credential is missing. If you switch to PyPI Trusted Publishing (OIDC,
          # see the publish step below), drop this check and add `id-token: write`
          # to the job permissions instead.
          if [[ -z "${PYPI_API_TOKEN:-}" ]]; then
            echo "::error::PYPI_API_TOKEN secret is not set. Add it under Settings -> Secrets and variables -> Actions before releasing."
            exit 1
          fi
          echo "Required secrets present."

      # Mint a short-lived GitHub App installation token so the push to `main` runs as
      # the App (which sits in the branch-protection ruleset's bypass list). Skipped
      # until RELEASE_APP_ID is set; then the push falls back to GITHUB_TOKEN. See
      # release-token-bypass.md.
      - name: Mint GitHub App token
        id: app-token
        if: ${{ vars.RELEASE_APP_ID != '' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 0 # full history + tags, for version math and git-cliff
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      # Rust toolchain: maturin compiles the PyO3 extension during the build step.
      # Pinned to the same SHA as in ci.yml (dtolnay/rust-toolchain@stable).
      - uses: dtolnay/rust-toolchain@d8352f6b1d2e870bc5716e7a6d9b65c4cc244a1a # stable

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Determine next version
        id: version
        run: |
          set -euo pipefail
          # Newest version-sorted release tag. Use for-each-ref (--count=1) rather than
          # `git tag --list ... | head -n1`: head closes the pipe after one line, which
          # can SIGPIPE-abort `git tag` under `set -o pipefail` once the tag list exceeds
          # the pipe buffer (~thousands of tags).
          LATEST_TAG=$(git for-each-ref --count=1 --sort=-v:refname \
            --format='%(refname:short)' 'refs/tags/v[0-9]*.[0-9]*.[0-9]*')
          if [[ -n "$LATEST_TAG" ]]; then
            CURRENT="${LATEST_TAG#v}"
            if [[ ! "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Could not parse current version from tag (got: '$CURRENT')"
              exit 1
            fi
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "${{ inputs.bump }}" in
              major) NEW="$((MAJOR+1)).0.0" ;;
              minor) NEW="${MAJOR}.$((MINOR+1)).0" ;;
              patch) NEW="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
            esac
            echo "Latest release tag: $LATEST_TAG (current=$CURRENT); ${{ inputs.bump }} bump -> $NEW"
            echo "first_release=false" >> "$GITHUB_OUTPUT"
          else
            # First release: seed the version straight from pyproject.toml so the
            # published version matches what the repo declares. The bump input is ignored.
            CURRENT="0.0.0"
            NEW=$(grep -oP '(?<=^version = ")[^"]+' pyproject.toml | head -n1)
            echo "No release tags found; seeding first release from pyproject version=$NEW (bump input ignored)."
            echo "first_release=true" >> "$GITHUB_OUTPUT"
          fi
          if [[ ! "$NEW" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Computed version '$NEW' is not a valid MAJOR.MINOR.PATCH semver."
            exit 1
          fi
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"

      - name: Verify tag does not exist
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists"
            exit 1
          fi

      # git-cliff (next step) needs the previous tag locally to bound its commit range.
      # When it is missing (synthetic v0.0.0 of a first release) create it locally and
      # DO NOT push it — pushing would be a remote write before the pivot and would
      # break first-release re-run safety.
      - name: Ensure previous tag exists (local only)
        env:
          PREV_TAG: v${{ steps.version.outputs.current }}
        run: |
          set -euo pipefail
          if git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            echo "Previous tag $PREV_TAG already exists."
            exit 0
          fi
          ROOT=$(git rev-list --max-parents=0 HEAD | tail -n1)
          echo "Previous tag $PREV_TAG does not exist; creating it locally at root commit $ROOT (not pushed)."
          git tag "$PREV_TAG" "$ROOT"

      - name: Install git-cliff
        uses: taiki-e/install-action@cde8c9e634f4a17bc06b61413ac0ef75450eac46 # v2
        with:
          tool: git-cliff@2

      - name: Auto-fill [Unreleased] from git log if empty
        env:
          PREV_TAG: v${{ steps.version.outputs.current }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import pathlib
          import re
          import subprocess
          import sys

          prev_tag = os.environ["PREV_TAG"]
          path = pathlib.Path("CHANGELOG.md")
          text = path.read_text()

          m = re.search(r"^## \[Unreleased\]\s*\n(.*?)(?=^## \[|\Z)", text, re.M | re.S)
          if not m:
              print("::error::Could not find '## [Unreleased]' header in CHANGELOG.md", file=sys.stderr)
              sys.exit(1)

          body = m.group(1)
          has_real_bullets = any(re.match(r"^-\s+\S", ln) for ln in body.splitlines())
          if has_real_bullets:
              print("[Unreleased] already has manual entries; skipping auto-fill.")
              sys.exit(0)

          print(f"[Unreleased] is empty; generating from git log since {prev_tag}...")
          result = subprocess.run(
              ["git-cliff", "--config", "cliff.toml", "--strip", "all", f"{prev_tag}..HEAD"],
              check=True,
              capture_output=True,
              text=True,
          )
          generated = result.stdout.strip()
          if not generated:
              print(
                  f"::error::No release-worthy commits found between {prev_tag} and HEAD. "
                  "Either add a manual entry to [Unreleased] in CHANGELOG.md, or commit "
                  "changes with a recognised prefix (Add/Fix/Refactor/Update/Remove/...).",
                  file=sys.stderr,
              )
              sys.exit(1)

          new_text = text[: m.start(1)] + generated + "\n\n" + text[m.end(1) :]
          path.write_text(new_text)
          print("----- auto-generated [Unreleased] body -----")
          print(generated)
          print("--------------------------------------------")
          PY

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          python3 <<'PY'
          import pathlib
          import re
          import sys

          text = pathlib.Path("CHANGELOG.md").read_text()
          m = re.search(r"^## \[Unreleased\]\s*\n(.*?)(?=^## \[|\Z)", text, re.M | re.S)
          body = (m.group(1) if m else "").strip()

          # Keep "### Header" only if it has at least one real bullet ("- text").
          parts = re.split(r"(?m)(^### .+$)", body)
          out = []
          for i in range(1, len(parts), 2):
              header = parts[i]
              section = parts[i + 1] if i + 1 < len(parts) else ""
              bullets = [ln for ln in section.splitlines() if re.match(r"^-\s+\S", ln)]
              if bullets:
                  if out:
                      out.append("")
                  out.append(header)
                  out.extend(bullets)

          result = "\n".join(out).strip()
          if not result:
              print(
                  "::error::[Unreleased] section in CHANGELOG.md is empty. "
                  "Add release notes before releasing.",
                  file=sys.stderr,
              )
              sys.exit(1)

          pathlib.Path("release-notes.md").write_text(result + "\n")
          print("----- release-notes.md -----")
          print(result)
          print("----------------------------")
          PY

      # Persist the computed version into pyproject.toml AND Cargo.toml BEFORE building
      # so the wheel carries the released version. maturin reads the version from
      # pyproject.toml; Cargo.toml is bumped in parallel to keep both in sync.
      # These are reversible local edits — committed below, reach the remote after the pivot.
      - name: Bump version in pyproject.toml and Cargo.toml
        run: |
          set -euo pipefail
          NEW="${{ steps.version.outputs.version }}"
          sed -i -E "s|^version = \"[^\"]+\"|version = \"$NEW\"|" pyproject.toml
          sed -i -E "s|^version = \"[^\"]+\"|version = \"$NEW\"|" Cargo.toml

      # Gate + package: run the tests, then build a release abi3 wheel AND an sdist.
      # - `maturin build --release` produces the platform wheel (abi3, cp310+).
      # - `maturin sdist` produces the source distribution (.tar.gz) for users who
      #   build from source (unsupported platforms, audit, etc.).
      # Both reads the version written into pyproject.toml above.
      - name: Test and package
        run: |
          set -euo pipefail
          uv run pytest
          uv run maturin build --release --out-dir ./artifacts
          uv run maturin sdist --out-dir ./artifacts

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd ./artifacts
          files=(*.whl *.tar.gz)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No package files to hash in ./artifacts. Did the build step run?"
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS
          cat SHA256SUMS

      - name: Promote Unreleased section in CHANGELOG.md
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          PREV_TAG: v${{ steps.version.outputs.current }}
          FIRST_RELEASE: ${{ steps.version.outputs.first_release }}
          REPO: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import pathlib
          import re
          import sys
          from datetime import datetime, timezone

          version = os.environ["VERSION"]
          tag = os.environ["TAG"]
          prev_tag = os.environ["PREV_TAG"]
          first_release = os.environ.get("FIRST_RELEASE") == "true"
          repo = os.environ["REPO"]
          date = datetime.now(timezone.utc).strftime("%Y-%m-%d")

          path = pathlib.Path("CHANGELOG.md")
          text = path.read_text()

          new_unreleased = (
              "## [Unreleased]\n\n"
              "### Added\n-\n\n"
              "### Changed\n-\n\n"
              "### Fixed\n-\n\n"
              f"## [{version}] - {date}"
          )
          text, n = re.subn(r"^## \[Unreleased\]$", new_unreleased, text, count=1, flags=re.M)
          if n != 1:
              print("::error::Could not find '## [Unreleased]' header in CHANGELOG.md", file=sys.stderr)
              sys.exit(1)

          # On the first release the previous tag (v0.0.0) is synthetic — created
          # locally to bound git-cliff and never pushed — so a compare link against
          # it would 404. Point the first version at its own tag instead.
          if first_release:
              versioned_link = f"[{version}]: {repo}/releases/tag/{tag}"
          else:
              versioned_link = f"[{version}]: {repo}/compare/{prev_tag}...{tag}"
          link_replacement = (
              f"[Unreleased]: {repo}/compare/{tag}...HEAD\n"
              + versioned_link
          )
          text, n = re.subn(r"^\[Unreleased\]:.*$", link_replacement, text, count=1, flags=re.M)
          if n != 1:
              print("::error::Could not find '[Unreleased]: ...' reference link in CHANGELOG.md", file=sys.stderr)
              sys.exit(1)

          path.write_text(text)
          PY

      # Create the release commit and tag LOCALLY, but do NOT push yet: the push is a
      # VCS write and must happen AFTER the irreversible PyPI publish (the pivot below).
      - name: Commit and tag the release (local only)
        run: |
          set -euo pipefail
          git config user.name "Anton Zhelezniakou"
          git config user.email "github@zelanton.net"
          git add pyproject.toml CHANGELOG.md Cargo.toml
          # uv.lock and Cargo.lock record resolved deps; re-stage only if already tracked.
          if git ls-files --error-unmatch uv.lock >/dev/null 2>&1; then git add uv.lock; fi
          if git ls-files --error-unmatch Cargo.lock >/dev/null 2>&1; then git add Cargo.lock; fi
          git commit -m "Release ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"

      # === PIVOT: the single irreversible step ===
      # Publishing to PyPI cannot be undone (a published version can be yanked but
      # never re-uploaded), so it is the pivot and every reversible action is ordered
      # around it. It runs BEFORE the git push and the GitHub Release: if it fails, no
      # tag/commit has reached the remote and no Release exists, so a re-run is safe
      # and recomputes the SAME version. `twine upload --skip-existing` treats an
      # already-published file (HTTP 409) as success — PyPI's own version-scoped
      # "already published == success" signal — so a re-run after a post-publish
      # failure sails through. The loop retries only transient (network) failures.
      #
      # MORE SECURE ALTERNATIVE — PyPI Trusted Publishing (OIDC): instead of a
      # long-lived PYPI_API_TOKEN secret, mint a short-lived credential per run. Add
      # `id-token: write` to this job's permissions, configure a trusted publisher on
      # pypi.org for this repo+workflow, then swap the step below for the
      # `pypa/gh-action-pypi-publish` action (drop the preflight token check).
      # See https://docs.pypi.org/trusted-publishers/
      - name: Publish to PyPI (irreversible pivot)
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if uvx twine upload --skip-existing ./artifacts/*.whl ./artifacts/*.tar.gz; then
              echo "PyPI upload succeeded (attempt $attempt)."
              exit 0
            fi
            echo "::warning::PyPI upload attempt $attempt failed; retrying after backoff..."
            sleep $((attempt * 15))
          done
          echo "::error::PyPI upload failed after 3 attempts. Nothing was pushed to the remote and no Release was created — it is safe to re-run this workflow."
          exit 1

      # Reversible VCS write, AFTER the pivot. --atomic guarantees the branch and tag
      # move together (or neither does), so we never advance main while losing the tag.
      - name: Push the release commit + tag (atomic)
        run: git push --atomic origin HEAD:refs/heads/main "${{ steps.version.outputs.tag }}"

      # Final, recreatable step, made idempotent (edit the Release if it already
      # exists, else create it) and retried. By now the package is on PyPI AND the tag
      # is on main, so a blind re-run of the WHOLE workflow would compute the NEXT
      # version and orphan this release — hence the failure message tells the operator
      # to finish by hand rather than re-running.
      - name: Create or update the GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(./artifacts/*.whl ./artifacts/*.tar.gz ./artifacts/SHA256SUMS)
          for attempt in 1 2 3; do
            if gh release view "$TAG" >/dev/null 2>&1; then
              if gh release edit "$TAG" --title "$TAG" --notes-file release-notes.md \
                 && gh release upload "$TAG" "${assets[@]}" --clobber; then
                echo "Updated existing Release $TAG (attempt $attempt)."
                exit 0
              fi
            else
              if gh release create "$TAG" --title "$TAG" --notes-file release-notes.md "${assets[@]}"; then
                echo "Created Release $TAG (attempt $attempt)."
                exit 0
              fi
            fi
            echo "::warning::GitHub Release step attempt $attempt failed; retrying after backoff..."
            sleep $((attempt * 10))
          done
          echo "::error::Failed to create/update the GitHub Release after 3 attempts. The package is ALREADY on PyPI and the tag is ALREADY on main. Do NOT re-run this workflow (a re-run computes the NEXT version and orphans this release). Finish by hand: if the Release does not exist yet, 'gh release create $TAG --title $TAG --notes-file release-notes.md ./artifacts/*.whl ./artifacts/*.tar.gz ./artifacts/SHA256SUMS'; if it already exists, 'gh release edit $TAG --notes-file release-notes.md && gh release upload $TAG ./artifacts/*.whl ./artifacts/*.tar.gz ./artifacts/SHA256SUMS --clobber'."
          exit 1
