name: Test release (TestPyPI)

# Manual dry-run of the release packaging path: build the same cibuildwheel
# matrix + sdist as the real release, then publish to TestPyPI. Unlike
# release.yml it has NO side effects — no version bump, no commit/tag, no GitHub
# Release — so it is safe to run repeatedly to verify the build + upload path.
#
# Requires the TESTPYPI_API_TOKEN secret (a TestPyPI API token). Uploads the
# version currently in pyproject.toml with `--skip-existing`, so re-runs of the
# same version are no-ops.

on:
  workflow_dispatch:

concurrency:
  group: test-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Require the TestPyPI token
        env:
          TESTPYPI_API_TOKEN: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${TESTPYPI_API_TOKEN:-}" ]]; then
            echo "::error::TESTPYPI_API_TOKEN secret is not set. Add a TestPyPI API token under Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          echo "TestPyPI token present."

  build_wheels:
    needs: preflight
    name: wheels (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-13, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Build wheels
        run: uvx 'cibuildwheel>=4,<5' --output-dir wheelhouse
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Build sdist
        run: uvx maturin sdist --out dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish_testpypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Collect built distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./dist
          pattern: "{wheels-*,sdist}"
          merge-multiple: true
      - name: Check metadata
        run: uvx twine check ./dist/*
      - name: Upload to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TESTPYPI_API_TOKEN }}
          TWINE_REPOSITORY_URL: https://test.pypi.org/legacy/
        run: uvx twine upload --skip-existing ./dist/*.whl ./dist/*.tar.gz
