name: Build distributions (reusable)

# Reusable (`workflow_call`) build of the release artifacts: the cibuildwheel
# matrix (one abi3 GIL wheel + a free-threaded cp314t wheel per OS/arch) plus the
# platform-independent sdist. Both release.yml and test-release.yml call this so
# the 5-OS matrix lives in one place.
#
# It only BUILDS and uploads artifacts (`wheels-<os>` and `sdist`); it never
# publishes, so it has no side effects and needs no secrets. The two callers
# differ only in the inputs below.

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to check out. Empty = the ref that triggered the caller."
        type: string
        default: ""
      overlay-release-meta:
        description: >-
          Download the `release-meta` artifact (uploaded by the caller's prepare
          job) and overlay it onto the checkout, so the built artifacts carry the
          bumped release version. The release path sets this; the TestPyPI dry-run
          builds the version already in pyproject.toml.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # The abi3 wheel (cp310, runs on every GIL CPython 3.10+) plus a free-threaded
  # cp314t wheel per OS/arch. Each runner builds its own native arch (no
  # cross-compile): Linux x86_64 (manylinux), Linux aarch64 (native ARM runner),
  # Windows x64, macOS x86_64 (macos-13) and arm64 (macos-14).
  # ---------------------------------------------------------------------------
  build_wheels:
    name: wheels (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-13, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      # Host toolchain for the Windows/macOS builds; the Linux manylinux container
      # installs its own Rust via the cibuildwheel `before-all` hook (pyproject.toml).
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      # Overlay the version-bumped manifests so the wheel carries the release version.
      - if: ${{ inputs.overlay-release-meta }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-meta
          path: .
      - name: Build wheels
        run: uvx 'cibuildwheel>=4,<5' --output-dir wheelhouse
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # The platform-independent source distribution, built once.
  # ---------------------------------------------------------------------------
  build_sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - if: ${{ inputs.overlay-release-meta }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-meta
          path: .
      # `maturin sdist` packages source only (no compile), so no Rust toolchain here.
      - name: Build sdist
        run: uvx maturin sdist --out dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
