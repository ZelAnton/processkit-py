# Local Linux test harness for processkit-py. Run from the repo root:
#
#   docker compose run --build --rm test
#
# `--build` picks up your latest source; `--rm` removes the one-off container.
# Append a command to scope the run, e.g.:
#
#   docker compose run --build --rm test uv run pytest -q tests/test_async.py
services:
  test:
    image: processkit-py-test
    build:
      context: .
      dockerfile: docker/Dockerfile
    # Privileged so the crate can create a delegated cgroup v2 and select the
    # `cgroup_v2` containment mechanism — the same path the CI Linux runner
    # exercises. Remove this line to test the POSIX `process_group` fallback.
    privileged: true
    # Share the host's cgroup namespace (rather than a private one) so
    # `/proc/self/cgroup` reports this container's REAL path in the host's
    # cgroup-v2 hierarchy instead of a virtualized `/`. Actual resource-limit
    # *enforcement* (not just mechanism selection) additionally requires this
    # process to be re-parented into the real hierarchy root before it runs —
    # see scripts/ci-privileged-check.sh, used by the CI `test-privileged` job
    # — because the "no internal processes" rule only exempts the true root,
    # never a cgroup-namespace-virtualized one (see docs/platforms.md).
    cgroup: host
    # A real init reaps the short-lived child/grandchild processes the teardown
    # tests spawn, so nothing lingers as a zombie.
    init: true

  # Root, but deliberately NOT privileged: `/sys/fs/cgroup` stays read-only (no
  # CAP_SYS_ADMIN), so `ProcessGroup` always falls back to the POSIX
  # `process_group` mechanism here, never `cgroup_v2`. This is its own service
  # (not a `test` variant) because of a documented processkit-rs limitation
  # (see the "Linux cgroup caveat" on `Command::uid()`'s doc comment): under the
  # `cgroup_v2` mechanism, a privilege-dropped `Command` tries to join its
  # (root-owned, auto-created) cgroup *after* the OS has already dropped to the
  # unprivileged uid, which fails with EACCES — so
  # test_privilege_drop_args_actually_drop_privilege can only actually PASS
  # where cgroup v2 delegation is inactive. Used by the CI `test-privileged`
  # job's root-euid half; shares the `test` image (same build) via the explicit
  # `image:` tag below, so `--build` on either service produces the same image.
  test-root:
    image: processkit-py-test
    build:
      context: .
      dockerfile: docker/Dockerfile
    init: true

  # musl (Alpine) counterpart of the `test-root` service above: root, but
  # deliberately NOT privileged, running the full pytest suite built against
  # **musl** (docker/Dockerfile.musl instead of the glibc docker/Dockerfile).
  # It closes the gap between the musllinux wheels this project ships and the
  # libc its tests run on — before this the wheels were only import-smoke-tested
  # on musl (scripts/smoke.py), never run through the real (real-subprocess)
  # suite. Used by the CI `test-musl` job (.github/workflows/ci.yml). Root
  # (Docker's default container user) so the privilege-drop path
  # (test_privilege_drop_args_actually_drop_privilege) is exercised on musl too;
  # unprivileged so `/sys/fs/cgroup` stays read-only and `ProcessGroup` falls
  # back to the POSIX `process_group` mechanism (the resource-limit tests
  # tolerate that fallback) — the fragile delegated-cgroup-v2 lane is left to the
  # glibc `test-privileged` job, not duplicated on musl. A real init reaps the
  # short-lived processes the teardown tests spawn, like the services above.
  test-musl:
    image: processkit-py-test-musl
    build:
      context: .
      dockerfile: docker/Dockerfile.musl
    init: true
