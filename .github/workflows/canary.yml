name: Canary (processkit crate)

# Weekly, informational-only signal for API drift: builds and tests the binding
# against the NEWEST published version of the `processkit` crate on crates.io,
# in case it has drifted outside the compatible-version requirement pinned in
# Cargo.toml (see that file's `processkit = { version = "2.1", ... }` comment
# for why the requirement is a range rather than an exact pin). The version
# bump below is applied only to this runner's ephemeral checkout -- nothing is
# ever committed or pushed back to the repo, so the real requirement bump stays
# a deliberate, reviewed change. This is deliberately a separate workflow from
# `ci.yml` (which it never
# edits): a schedule-triggered failure here only reddens this workflow's own
# status (and emails the actor who last touched this file, same as
# nightly-hardening.yml) -- it can never redden a push/PR gate, since nothing in
# ci.yml or branch protection depends on it.
on:
  schedule:
    # 06:41 UTC every Tuesday -- off-the-hour and distinct from codeql.yml's
    # Monday 05:32 UTC and nightly-hardening.yml's daily 03:17 UTC slots, so
    # scheduled workflows don't contend for runner capacity at the same instant.
    - cron: '41 6 * * 2'
  workflow_dispatch:

concurrency:
  group: canary
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  canary:
    name: canary (latest processkit crate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Discover the pinned vs. newest processkit crate version
        id: discover
        run: |
          set -euo pipefail
          raw=$(grep -oP '^processkit = \{ version = "\K[^"]+' Cargo.toml)
          latest=$(curl -sSL --fail \
            --user-agent "processkit-py-canary (https://github.com/ZelAnton/processkit-py)" \
            https://crates.io/api/v1/crates/processkit | jq -r '.crate.max_stable_version')
          echo "Pinned requirement in Cargo.toml: $raw"
          echo "Newest on crates.io: $latest"
          python3 - "$raw" "$latest" <<'PY' >> "$GITHUB_OUTPUT"
          import sys

          # Cargo's default ("caret") requirement semantics: a bare "X.Y.Z"/"X.Y"/"X"
          # requirement (no operator prefix) allows any version up to (but
          # excluding) the next increment of the leftmost non-zero component that
          # was actually written (e.g. "2.1" == ^2.1 == >=2.1.0, <3.0.0); an
          # "=X.Y.Z" requirement demands an exact match instead. See:
          # https://doc.rust-lang.org/cargo/reference/specifying-dependencies.html#caret-requirements
          def parse(version):
              parts = version.split(".")
              parts += ["0"] * (3 - len(parts))
              return tuple(int(part) for part in parts[:3])


          def caret_upper_bound(written, req):
              considered = req[:written]
              idx = next((i for i, part in enumerate(considered) if part != 0), written - 1)
              upper = list(req)
              upper[idx] += 1
              for j in range(idx + 1, 3):
                  upper[j] = 0
              return tuple(upper)


          raw, latest = sys.argv[1], sys.argv[2]
          exact = raw.startswith("=")
          requirement = raw[1:] if exact else raw
          written = len(requirement.split("."))
          req_tuple = parse(requirement)
          latest_tuple = parse(latest)

          if exact:
              covered = req_tuple == latest_tuple
          else:
              covered = req_tuple <= latest_tuple < caret_upper_bound(written, req_tuple)

          print(f"current={raw}")
          print(f"latest={latest}")
          print(f"covered={'true' if covered else 'false'}")
          PY

      # The bump + build/test steps only run when the newest crate on crates.io
      # actually falls outside the requirement pinned in Cargo.toml, so an
      # already-covering range doesn't waste a rebuild every week.
      - name: Bump the pin in the working copy (never committed)
        if: steps.discover.outputs.covered != 'true'
        env:
          CURRENT: ${{ steps.discover.outputs.current }}
          LATEST: ${{ steps.discover.outputs.latest }}
        run: |
          set -euo pipefail
          new_req=$(python3 - "$CURRENT" "$LATEST" <<'PY'
          import sys

          # Preserve the pinned requirement's style: keep the "=" exact-pin
          # prefix if present, and truncate LATEST to the same number of
          # dot-separated components the current requirement was written with.
          current, latest = sys.argv[1], sys.argv[2]
          exact = current.startswith("=")
          written = len((current[1:] if exact else current).split("."))
          bumped = ".".join(latest.split(".")[:written])
          print(("=" if exact else "") + bumped)
          PY
          )
          sed -i -E "s/^(processkit = \{ version = \")[^\"]+\"/\1${new_req}\"/" Cargo.toml
          grep -n '^processkit = ' Cargo.toml
          cargo update -p processkit --precise "${LATEST}"

      - name: Build + test the binding against the newest crate
        id: build
        if: steps.discover.outputs.covered != 'true'
        # `uv run` provisions the interpreter and syncs the environment; an
        # explicit `maturin develop` first guarantees the extension is rebuilt
        # against the bumped Cargo.toml/Cargo.lock rather than relying on uv's
        # own staleness detection to notice a Rust-only source change.
        run: |
          uv run maturin develop
          uv run pytest

      - name: Job summary
        if: always()
        env:
          CURRENT: ${{ steps.discover.outputs.current }}
          LATEST: ${{ steps.discover.outputs.latest }}
          COVERED: ${{ steps.discover.outputs.covered }}
          OUTCOME: ${{ steps.build.outcome }}
        run: |
          {
            echo "## Canary: processkit crate freshness"
            echo
            if [ "$COVERED" = "true" ]; then
              echo "Newest on crates.io is **$LATEST** -- covered by the pinned requirement \`$CURRENT\` in Cargo.toml, nothing to build/test."
            elif [ "$OUTCOME" = "success" ]; then
              echo "Newest on crates.io is **$LATEST** -- outside the pinned requirement \`$CURRENT\` in Cargo.toml. Build/tests against it: :white_check_mark: green."
            else
              echo "Newest on crates.io is **$LATEST** -- outside the pinned requirement \`$CURRENT\` in Cargo.toml. Build/tests against it: :x: red."
              echo "See the failed step above for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
